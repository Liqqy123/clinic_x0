{% extends 'base.html' %}

{% block title %}Запись на приём{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px; margin: 40px auto;">
    <div class="card" >
        <h2>Запись на приём</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn" style="margin-top: 20px;">Отправить заявку</button>
        </form>
        <p style="margin-top: 20px;">
            <a href="{% url 'appointments:list' %}">← Назад к моим записям</a>
        </p>
    </div>
</div>
{% endblock %}
