{% load static %}
<div style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;padding: 5px 120px">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="/">
                <img src="{% static 'main/image/logo.svg' %}" alt="ЗдравТочка" style="height: 50px;">
            </a>
            <span style="color: #003087;font-weight: bold;font-size: 17px">Пространство здоровья</span>
        </div>
        <div style="display: flex; gap: 24px; align-items: center;">

            {% if user.is_authenticated %}
                <div style="text-align: right; line-height: 1.3;">
                    <div style="font-weight: 500;">Добро пожаловать, {{ user_full_name }}</div>
                    <div style="font-size: 12px; color: #003087;">{{ user_role }}</div>
                </div>
                <a href="{% url 'users:logout' %}" class="btn-logout">Выход</a>
            {% else %}
                <a href="{% url 'users:login' %}" class="btn-login">Вход</a>
                <a href="{% url 'users:register' %}" class="btn-register">Регистрация</a>
            {% endif %}
        </div>
        </div>
    </div>
</div>
